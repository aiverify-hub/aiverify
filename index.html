    if(t==='WORD_OR_PHRASE') return 'A word or phrase alone can be defined, but AIVerify needs one specific claim, question, page, source, or context before checking accuracy.';

  function inferTranscriptSourceClass(inputText,text){

  function inferTranscriptStatusFromBackend(text,inputText){
    if(!isYouTubeInput(inputText)) return null;
    let out;
    if(/partial\s*transcript|transcript\s*partial|partial\s*caption/i.test(text)) out={state:"partial",detail:transcriptUserDetail("partial")};
    else if(/transcript\s+(retrieved|available|found|loaded)|caption\s+(retrieved|available|found|loaded)/i.test(text)) out={state:"available",detail:transcriptUserDetail("available")};
    else if(/transcript\s+(disabled|turned off)|captions?\s+(disabled|turned off)/i.test(text)) out={state:"disabled",detail:transcriptUserDetail("disabled")};
    else if(/transcript\s+(blocked|restricted)|captions?\s+(blocked|restricted)|provider\s+(blocked|limited)|429|403/i.test(text)) out={state:"blocked",detail:transcriptUserDetail("blocked")};
    else if(/transcript\s+(unavailable|not available|missing|not found)|captions?\s+(unavailable|not available|missing|not found)|no usable transcript/i.test(text)) out={state:"unavailable",detail:transcriptUserDetail("unavailable")};
    else if(/transcript\s+(fail|failed|error)|caption\s+(fail|failed|error)/i.test(text)) out={state:"failed retrieval",detail:transcriptUserDetail("failed retrieval")};

    out.detail=appendTranscriptSourceDetail(out.detail,inputText,text);

  function splitInputSubjects(value){
    const text=String(value||"").trim();
    if(!text)return [];
    if(/^https?:\/\/\S+$/i.test(text)) return [text];
    const protectedText=text
      .replace(/\bU\.S\./g,"U§S§")
      .replace(/\bU\.K\./g,"U§K§")
      .replace(/\bU\.N\./g,"U§N§")
      .replace(/\bU\.A\.E\./g,"U§A§E§")
      .replace(/\bD\.C\./g,"D§C§")
      .replace(/\be\.g\./gi,"e§g§")
      .replace(/\bi\.e\./gi,"i§e§");
    const restore=function(x){return String(x||"")
      .replace(/U§S§/g,"U.S.")
      .replace(/U§K§/g,"U.K.")
      .replace(/U§N§/g,"U.N.")
      .replace(/U§A§E§/g,"U.A.E.")
      .replace(/D§C§/g,"D.C.")
      .replace(/e§g§/gi,"e.g.")
      .replace(/i§e§/gi,"i.e.");};
    const parts=protectedText.split(/(?<=[.!?])\s+/).map(x=>restore(x).trim()).filter(Boolean);
    return parts.length ? parts : [text];
  }

  async function startRetryTimeoutTest(raw){
    cancelActiveRender();
    const runId=activeRenderRun;
    lastAnalyzedInput=raw;
    updateSubjectCountPreview();
    const state={raw:raw,normalized:normalizeRetryTestInput(raw),session:retrySessionId(),token:retryToken(),runId:runId,timedOut:false};
    retryTimeoutState=state;
    scanning('Analyzing');
    activeAbortController=(typeof AbortController!=="undefined")?new AbortController():null;
    retryStatusTimer=setTimeout(function(){
      if(!retryTimeoutState || retryTimeoutState.token!==state.token || activeRenderRun!==runId)return;
      setText('lastAction','Still gathering facts...');
      replaceResultHtml(loadingWaveHtml('Still gathering facts'));
    },10000);
    retryStopTimer=setTimeout(async function(){
      if(!retryTimeoutState || retryTimeoutState.token!==state.token || activeRenderRun!==runId)return;
      state.timedOut=true;
      if(activeAbortController){try{activeAbortController.abort();}catch(_e){}}

      const status=await getRetryTestStatus(state);
      if(activeRenderRun!==runId)return;
      renderRetryTimeoutPanel(status&&status.diagnostics?status.diagnostics:{});
    },20000);
    try{
      const url=RETRY_TEST_BASE+'/start?input='+encodeURIComponent(raw)+'&session='+encodeURIComponent(state.session)+'&token='+encodeURIComponent(state.token)+'&_='+Date.now();

  async function retryTimedOutAnalysis(){
    const state=retryTimeoutState;
    const i=input();
    const current=sanitizeInputForAnalyze(i?i.value.trim():'');
    if(!state || !state.timedOut){return;}
    if(normalizeRetryTestInput(current)!==state.normalized){
      hardClearRenderedResults();
      replaceResultHtml('<div class="err">The input changed. Retry can only use data saved for the exact timed-out scan.</div>');
      setText('lastAction','Retry input mismatch');
      return;
    }
    cancelActiveRender();
    const runId=activeRenderRun;
    state.runId=runId;
    retryTimeoutState=state;
    lastAnalyzedInput=current;
    scanning('Resuming saved analysis');
    activeAbortController=(typeof AbortController!=="undefined")?new AbortController():null;
    try{
      const url=RETRY_TEST_BASE+'/retry?input='+encodeURIComponent(current)+'&session='+encodeURIComponent(state.session)+'&token='+encodeURIComponent(state.token)+'&_='+Date.now();
      const options={cache:'no-store',mode:'cors'};
      if(activeAbortController)options.signal=activeAbortController.signal;
      const res=await fetch(url,options);
      const payload=await res.json();
      if(runId!==activeRenderRun)return;
      if(!res.ok || !payload.ok){
        hardClearRenderedResults();
        replaceResultHtml('<div class="err">'+esc(payload&&payload.error?payload.error:'Retry failed.')+'</div>'+retryDiagnosticsHtml(payload&&payload.diagnostics));
        setText('lastAction','Retry failed');
        return;
      }
      renderRetryTestResult(payload);
      setText('lastAction','Done');
      retryTimeoutState=null;
    }catch(e){
      if(e&&e.name==='AbortError')return;
      errorState(e,runId);
    }finally{
      if(runId===activeRenderRun)activeAbortController=null;
    }
  }

      if(/^AI Writing Estimate:/i.test(line)){ai.indicators=cleanValue(line,"AI Writing Estimate"); return;}
      if(/^AI Generation Indicators:/i.test(line)){ai.indicators=cleanValue(line,"AI Generation Indicators"); return;}

      if(/^What Influenced This Estimate:/i.test(line)){ai.signals=cleanAiInfluenceText(cleanValue(line,"What Influenced This Estimate")); return;}
      if(/^AI Indicator Reasoning:/i.test(line)){ai.reasoning=cleanValue(line,"AI Indicator Reasoning"); return;}
      if(/^Plain-English Reason:/i.test(line)){ai.reasoning=cleanValue(line,"Plain-English Reason"); return;}
      if(/^What Influenced This Estimate:/i.test(line)){ai.reasoning=cleanAiInfluenceText(cleanValue(line,"What Influenced This Estimate")); return;}
      if(/^AI Technical Details:/i.test(line)){ai.technical=cleanValue(line,"AI Technical Details"); return;}
      if(/^Plain-language Reason:/i.test(line)){ai.reasoning=cleanValue(line,"Plain-language Reason"); return;}
      if(/^\s*[*•-]?\s*AI Detection Note:/i.test(line)){ai.note=String(line||"").replace(/^\s*[*•-]?\s*AI Detection Note:\s*/i,"").trim(); return;}
      if(/^\s*[*•-]?\s*AI Note:/i.test(line)){ai.note=String(line||"").replace(/^\s*[*•-]?\s*AI Note:\s*/i,"").trim(); return;}
      if(/^(?:Source\s+(?:emphasis|Influence)|Influence):/i.test(line)){globalSourceInfluence=String(line||"").replace(/^(?:Source\s+(?:emphasis|Influence)|Influence):\s*/i,"").trim(); if(current&&!current.sourceInfluence) current.sourceInfluence=globalSourceInfluence; return;}
      if(/^EvidenceGroup:/i.test(line)){

        const body=cleanValue(line,"ClaimKey");

      }

      if(current && /^Analysis Result:/i.test(line)){current.analysisResult=cleanValue(line,"Analysis Result"); current.status=current.analysisResult || current.status; return;}
      if(current && /^ClaimText:/i.test(line)){current.claimText=stripAivDiagnosticChunks(cleanValue(line,"ClaimText")); if(current.claimText) current.subject=current.claimText; return;}
      if(current && /^Summary:/i.test(line)){current.summary=stripAivDiagnosticChunks(cleanValue(line,"Summary")); return;}
      if(current && /^Evidence:/i.test(line)){const extractedEvidence=extractClaimTextFromRawDiagnostics(line); current.evidence=extractedEvidence || stripAivDiagnosticChunks(cleanValue(line,"Evidence")); return;}
      if(current && /^(?:Source\s+(?:emphasis|Influence)|Influence):/i.test(line)){current.sourceInfluence=String(line||"").replace(/^(?:Source\s+(?:emphasis|Influence)|Influence):\s*/i,"").trim(); return;}
      if(current && /^Faith Priority Confidence:/i.test(line)){current.faithConfidence=cleanValue(line,"Faith Priority Confidence"); return;}
      if(current && /^Faith Confidence:/i.test(line)){current.faithConfidence=shortFaithConfidence(cleanValue(line,"Faith Confidence")); return;}
      if(current && /^Confidence in result:/i.test(line)){current.confidenceInResult=cleanValue(line,"Confidence in result"); current.faithConfidence=current.confidenceInResult || current.faithConfidence; return;}
      if(current && /^Supporting Information:/i.test(line)){current.supportingInformation=cleanValue(line,"Supporting Information"); return;}
      if(current && /^Contradiction Scriptures:/i.test(line)){current.contradictionScriptures=cleanValue(line,"Contradiction Scriptures"); return;}
      if(current && /^Source Reliability Rated:/i.test(line)){current.sourceReliabilityRated=cleanValue(line,"Source Reliability Rated"); return;}
      if(current && /^Sources\/Score:/i.test(line)){current.sources=cleanValue(line,"Sources\\/Score"); return;}
      if(current && /^Sources:/i.test(line)){const rawSrc=cleanValue(line,"Sources"); const cleanSrc=stripAivDiagnosticChunks(rawSrc); current.sources=cleanSrc || rawSrc; return;}
      if(current && /^Source\s*URL:/i.test(line)){current.sourceUrl=String(line||"").replace(/^Source\s*URL:\s*/i,"").trim(); return;}
      if(current && /^Overall Reliability Score:/i.test(line)){current.overallReliabilityScore=cleanValue(line,"Overall Reliability Score"); return;}
      if(current && /^InputWords:/i.test(line)){
        const wm=String(line).match(/InputWords:\s*(\d+)\s*\|\s*InputCharacters:\s*(\d+)/i);

      }

          if(m[2]) current.overallReliabilityScore=m[2]+"%";
        }
        return;
      }
    });
    pushCurrent();

    if(!claims.length){
      const evidence=(lines.find(x=>/^Evidence:/i.test(x))||"").replace(/^Evidence:\s*/i,"");
      const sources=(lines.find(x=>/^Sources\/Score:/i.test(x))||lines.find(x=>/^Sources:/i.test(x))||"").replace(/^Sources\/Score:\s*/i,"").replace(/^Sources:\s*/i,"");

      let fallbackClaims=[];

      }
      if(!fallbackClaims.length && /hydration/i.test(s) && /moon/i.test(s)){

  }

  function addNumberedTranscriptClaims(text, claims){
    const rawLines=String(text||"").split(/\r?\n/).map(function(x){return String(x||"").trim();}).filter(Boolean);
    const numbered=[];

    function cleanTitleFromDetail(subject, detail){
      let d=String(detail||"").trim();
      let s=String(subject||"").trim();

      // Prefer real list topic titles inside the detail over generic fallback subjects.
      let m=d.match(/Number\s+(ten|nine|eight|seven|six|five|four|three|two|one|\d+)\s*,?\s+([^\.]{8,95})/i);
      if(m && m[2]){
        let title=m[2].trim()
          .replace(/^the\s+/i,'')
          .replace(/\s+/g,' ');
        return title.replace(/\b\w/g,function(ch){return ch.toUpperCase();});
      }

      // If no list marker appears, use the opening sentence/phrase.
      m=d.match(/^([^\.]{12,90})/);
      if(m && m[1]){
        let title=m[1].replace(/^(what you'?re about to hear is|imagine|this case is|the case of)\s+/i,'').trim();
        if(title.length>8) return title.replace(/\b\w/g,function(ch){return ch.toUpperCase();});
      }

      return s || "Transcript Claim";
    }

    for(let i=0;i<rawLines.length;i++){
      const m=rawLines[i].match(/^(\d{1,2})\.\s+(.+)$/);
      if(!m) continue;

      const num=parseInt(m[1],10);
      if(!num || num<1 || num>10) continue;

      let subject=String(m[2]||"").trim();
      let summary="", evidence="", influence="", sources="", detail="";
      let parts=[];

      for(let j=i+1;j<rawLines.length;j++){
        const line=rawLines[j];
        if(/^\d{1,2}\.\s+/.test(line)) break;

        if(/^PRIMARY DETERMINATION:/i.test(line)){summary=line.replace(/^PRIMARY DETERMINATION:\s*/i,"").trim(); continue;}
        if(/^Determination note:/i.test(line) && !summary){summary=line.replace(/^Determination note:\s*/i,"").trim(); continue;}
        if(/^Support note:/i.test(line)){evidence=line.replace(/^Support note:\s*/i,"").trim(); continue;}
        if(/^Weight note:/i.test(line)){influence=line.replace(/^Weight note:\s*/i,"").trim(); continue;}
        if(/^Tier visibility:/i.test(line)){sources=line.replace(/^Tier visibility:\s*/i,"").trim(); continue;}
        if(/^Claim detail:/i.test(line)){
          detail=line.replace(/^Claim detail:\s*/i,"").trim();
          parts.push(detail);
          continue;
        }
        if(!/^\d+\s+words\s*\|\s*\d+\s+characters$/i.test(line)){
          parts.push(line);
        }
      }

      const fullText=(detail || parts.join(" ")).replace(/\s+/g," ").trim();
      subject=cleanTitleFromDetail(subject, fullText || detail);

      const wc=fullText ? fullText.split(/\s+/).filter(Boolean).length : 0;
      const cc=fullText ? fullText.length : 0;

      if(!summary) summary="Unsupported extraordinary claim — not independently corroborated.";
      summary=summary
        .replace(/;\s*repetition does not verify (?:the )?claim\.?/ig,'; repeated low-quality retellings are not independent corroboration.')
        .replace(/repetition does not verify (?:the )?claim\.?/ig,'repeated low-quality retellings are not independent corroboration.');

      numbered.push({
        key:"transcript_numbered_"+num,
        num:num,
        subject:subject,
        status:"NOT VERIFIED",
        summary:"NOT VERIFIED — "+summary.replace(/^NOT VERIFIED\s*[—-]\s*/i,"").replace(/^Unsupported/i,"Unsupported"),
        evidence:evidence || fullText,
        sourceInfluence:influence,
        sources:sources,
        overallReliabilityScore:"",
        inputWords:String(wc),
        inputCharacters:String(cc)
      });
    }

    if(numbered.length){
      numbered.sort(function(a,b){return a.num-b.num;});
      const byNum={};
      numbered.forEach(function(c){ if(!byNum[c.num]) byNum[c.num]=c; });

      const finalNumbered=[];
      for(let n=1;n<=10;n++){
        if(byNum[n]) finalNumbered.push(byNum[n]);
      }

      claims.length=0;
      finalNumbered.slice(0,10).forEach(function(c){ claims.push(c); });
    }

    return claims;
  }

  function splitClaimForDisplay(c){
    const raw=String(c||"").trim();
    const isMoonLanding=/moon\s+landing|apollo|nasa\s+faked|faked\s+the\s+moon|retroreflector/i.test(raw);
    const isMoon=/moon|cheese/i.test(raw);
    const isHydration=/hydration|water/i.test(raw);
    if(isHydration){
      return {subject:"Hydration", summary:"SUPPORTED — Normal hydration supported"};
    }
    if(isMoonLanding){
      return {subject:"Moon landing hoax claim", summary:"DISPUTED — Moon landing hoax claim is not supported"};
    }
    if(isMoon){
      return {subject:"Moon composition", summary:"DISPUTED — Moon is rock/mineral, not cheese"};
    }
    const parts=raw.split(/\s*[—-]\s*/);
    return {subject:parts[0]||raw, summary:parts.length>1 ? parts.slice(1).join(" — ") : raw};
  }
  function normalizeSourcePercentages(sources){
    let out=String(sources||"").trim();
    if(!out)return "";
    out=out.replace(/(\b\d{1,3})\/100\b/g,"$1%");
    out=out.replace(/(\b\d{1,3})(?!\s*%)(?=\s*(?:;|$))/g,"$1%");
    return out;
  }
  function inferOverallReliability(sources){
    const nums=Array.from(String(sources||"").matchAll(/(\d{1,3})(?:\/100|%|(?=\s*(?:;|$)))/g)).map(x=>Number(x[1])).filter(n=>Number.isFinite(n));
    if(!nums.length)return "";
    return Math.round(nums.reduce((a,b)=>a+b,0)/nums.length)+"%";
  }

  function decodePotentialQuerySubject(value){
    let s=String(value||"").trim();
    if(!s)return "";
    try{s=decodeURIComponent(s);}catch(_e){}
    const m=s.match(/[?&](?:url|input|q|claim)=([^&]+)/i);
    if(m && m[1]){try{s=decodeURIComponent(m[1].replace(/\+/g," "));}catch(_e){s=m[1].replace(/\+/g," ");}}
    return String(s||"").replace(/https?:\/\/[^\s]+/gi,function(u){return u;}).replace(/\s+/g," ").trim();
  }
  function humanReadableClaimTitle(c, displayLike, fallbackIndex){
    const d=displayLike||{};
    const combined=String([d.subject,c&&c.subject,c&&c.key,c&&c.classification,c&&c.status,c&&c.summary,c&&c.evidence,lastAnalyzedInput].filter(Boolean).join(" ")).toLowerCase();
    const decoded=decodePotentialQuerySubject((d.subject||'')+' '+lastAnalyzedInput).toLowerCase();
    const hay=(combined+' '+decoded).replace(/\s+/g,' ');
    if(/climate|human-caused|human caused|scientific consensus|global warming|consensus factual/.test(hay)) return "Scientific Consensus on Human-Caused Climate Change";
    if(/extraterrestrial structures|alien structures|structures on the moon/.test(hay)) return "Did NASA Find Extraterrestrial Structures on the Moon?";
    if(/u\.s\. government agency|us government agency|nasa is a|institutional factual/.test(hay)) return "Is NASA a U.S. Government Agency?";
    if(/jesus rose|resurrection/.test(hay)) return "Did Jesus Rise From the Dead?";
    if(/jesus walked on water/.test(hay)) return "Did Jesus Walk on Water?";
    let raw=decodePotentialQuerySubject(d.subject||((c&&c.subject)||(c&&c.key)||''));
    raw=raw.replace(/^\d+\.\s*/, '').trim();
    if(/^https?:\/\//i.test(raw) || raw.length>140){
      const parts=splitInputSubjects(raw).filter(Boolean);
      raw=parts[fallbackIndex]||parts[0]||raw;
    }
    raw=raw.replace(/[?!.]+$/,'').trim();
    if(!raw)return "Claim "+(Number(fallbackIndex||0)+1);
    if(raw.length>90) raw=raw.slice(0,87).replace(/\s+\S*$/,'')+'...';
    return raw.replace(/\burl\b\s*[:=]?/i,'').trim() || ("Claim "+(Number(fallbackIndex||0)+1));
  }

  function normalizeClaimDisplay(c){
    const d=splitClaimForDisplay((c.subject||c.key||"")+" — "+(c.status||c.summary||""));
    let subject=c.subject || d.subject;
    if(isInternalClaimIdentifier(subject)) subject=c.claimText || d.subject || '';
    if(isInternalClaimIdentifier(subject)) subject=extractClaimTextFromRawDiagnostics(String(c.evidence||c.summary||'')) || subject;
    let summary=c.summary || d.summary;
    const isFaith=/FAITH|SCRIPTURE|BIBLICAL/i.test(String(c.status||"")+" "+String(c.classification||"")) || /^FAITH-BASED/i.test(String(summary||""));
    if(!/^SUPPORTED|^DISPUTED|^NOT VERIFIED|^UNVERIFIED|^PENDING|^FAITH-BASED/i.test(summary)){
      if(c.status) summary=String(c.status).toUpperCase()+" — "+summary;
      else summary=(isFaith?"FAITH-BASED":"NOT VERIFIED")+" — "+summary;
    }
    return {
      subject,
      summary,
      evidence:stripAivDiagnosticChunks(c.evidence||c.Evidence||c.evidenceText||c.visibleEvidence||c.sourceEvidence||c.protectedReadableEvidence||""),
      sourceReliabilityRated:isFaith ? "" : (c.sourceReliabilityRated||""),
      sources:isFaith ? String(stripAivDiagnosticChunks(c.sources||"")).replace(/\s+-\s+\d{1,3}%/g,"").replace(/\s+\d{1,3}%/g,"") : normalizeSourcePercentages(stripAivDiagnosticChunks(c.sources||"")),
      overallReliabilityScore:isFaith ? "" : (c.overallReliabilityScore||inferOverallReliability(c.sources)||""),
      faithConfidence:isFaith ? (c.confidenceInResult||c.faithConfidence||"Highest confidence") : "",
      analysisResult:isFaith ? (c.analysisResult||"") : (c.analysisResult||""),
      confidenceInResult:isFaith ? (c.confidenceInResult||c.faithConfidence||"Highest confidence") : (c.confidenceInResult||""),
      supportingInformation:isFaith ? (c.supportingInformation||"") : (c.supportingInformation||""),
      contradictionScriptures:isFaith ? (c.contradictionScriptures||"") : "",
      inputWords:c.inputWords||"",
      inputCharacters:c.inputCharacters||"",

  }
  function claimInputCountFor(index,d){
    const subjects=splitInputSubjects(lastAnalyzedInput);
    const raw=subjects[index] || d.subject || "";
    const words=countWords(raw);
    const chars=String(raw||"").length;
    if(!words && !chars)return "";
    return words+" words | "+chars+" characters";
  }
  function validatedUserFacingEvidence(value, rawText){
    let s=stripAivDiagnosticChunks(String(value||'')).trim();
    if(!s) return '';
    if(isInternalClaimIdentifier(s)) return '';
    if(/^(?:none|not-needed|not needed|na|n\/a|null|undefined)$/i.test(s)) return '';

    const raw=String(rawText||'');
    const normalized=s.toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();

    const hasHardCitation=/https?:\/\/|\b(?:doi|pmid|isbn)\s*[:=]|\b(?:Matthew|Mark|Luke|John|Romans|Corinthians|Genesis|Exodus|Isaiah|Psalms|Revelation)\s+\d{1,3}:\d{1,3}\b|\bKJV\b/i.test(s);
    const hasSelfRetrievalMarker=/\b(?:retrieved page|page excerpt|extracted claim text|source context|article body|document excerpt|transcript excerpt|citation|official records? retrieved|HTTP\s+\d{3}|bytes retrieved)\b/i.test(s);
    const appearsInReadableEvidence=/EvidenceGroup:|Readable Evidence|Snippet:|Document Excerpt:|Transcript Excerpt:|Citation:/i.test(raw) && raw.toLowerCase().indexOf(normalized.slice(0,80))>=0;

    const looksSynthetic=/\b(?:general\s+NASA\s+or\s+Moon\s+facts|would need direct|claim this unusual|no strong supporting evidence|no reliable evidence is shown here|official government records identify|strong scientific agreement|independent corroboration|high-reliability|provide the transcript text|outside evidence is needed|apollo 11 mission records identify|neil armstrong and buzz aldrin|michael collins remained in lunar orbit|straightforward institutional fact|supported by strong scientific agreement)\b/i.test(s);
    const isFallback=/^Extracted from the selected (?:article body|analysis object):/i.test(s);

    if(looksSynthetic || isFallback) return '';
    if(hasHardCitation || hasSelfRetrievalMarker || appearsInReadableEvidence) return s;
    return '';
  }

  function finalEvidenceRenderGate(value, originalPayload, rawText){
    const candidate=validatedUserFacingEvidence(value || originalPayload, rawText);
    if(!candidate) return '';
    const combined=String(originalPayload||'')+' '+String(rawText||'');
    const hasValidatedOrigin=/https?:\/\/|\b(?:doi|pmid|isbn)\s*[:=]|EvidenceGroup:|Readable Evidence|Snippet:|Document Excerpt:|Transcript Excerpt:|Citation:|retrieved page|page excerpt|extracted claim text|source context|article body|document excerpt|transcript excerpt|official records? retrieved|HTTP\s+\d{3}|bytes retrieved/i.test(combined);
    if(!hasValidatedOrigin) return '';
    return candidate;
  }


  function validatedUserFacingReliability(value, rawText){
    let s=stripAivDiagnosticChunks(String(value||'')).trim();
    if(!s) return '';
    if(isInternalClaimIdentifier(s)) return '';
    if(/^(?:none|not-needed|not needed|na|n\/a|null|undefined)$/i.test(s)) return '';
    const raw=String(rawText||'');
    const combined=s+' '+raw;
    const hasValidatedOrigin=/https?:\/\/|\b(?:doi|pmid|isbn)\s*[:=]|EvidenceGroup:|Readable Evidence|Snippet:|Document Excerpt:|Transcript Excerpt:|Citation:|retrieved page|page excerpt|extracted claim text|source context|article body|document excerpt|transcript excerpt|official records? retrieved|HTTP\s+\d{3}|bytes retrieved|source retrieved|retrieval-backed|validated reliability record|source-derived reliability|evidence-derived reliability|citation-derived reliability/i.test(combined);
    const looksSynthetic=/^(?:\d{1,3}%|high|very high|medium|low|not verified|supported by scripture|faith-based scriptural result|consensus route active|institutional factual route active|not enough evidence shown|low support for this extraordinary claim|high support for this institutional fact|strong support for this claim|pending transcript text or independent support|source retrieved\s*\/.*)$/i.test(s)
      || /\b(?:confidence|route active|support for this|not enough evidence|pending transcript|scriptural result|strict extraordinary threshold|authority confidence|verification partial)\b/i.test(s);
    if(looksSynthetic && !hasValidatedOrigin) return '';
    if(/^\d{1,3}%$/.test(s) && !hasValidatedOrigin) return '';

  function normEvidenceForCompare(v){
    return String(v||'').toLowerCase().replace(/^(evidence:|readable title:|snippet:|source:)\s*/g,'').replace(/[^a-z0-9]+/g,' ').trim();

  function evidenceAppearsInGroups(evidence, groups){
    const e=normEvidenceForCompare(evidence);
    if(!e || !groups || !groups.length) return false;
    return groups.some(function(g){return (g.items||[]).some(function(item){
      const n=normEvidenceForCompare(item);
      return n && (n.indexOf(e.slice(0,80))>=0 || e.indexOf(n.slice(0,80))>=0);
    });});
  }
  function readableEvidencePresent(groups){
    return (groups||[]).some(function(g){return (g.items||[]).some(function(item){return /readable title:|snippet:|source:/i.test(String(item||''));});});
  }


  function cleanReadablePart(v){
    return String(v||'')
      .replace(/\bProtected readable evidence survived compact\/frontend path\b/gi,'')
      .replace(/\s*\.\.\.\s*/g,' ')
      .replace(/\s*;\s*$/,'')
      .replace(/\s+/g,' ')
      .trim();

  function formatReadableEvidenceItem(item){
    const raw=String(item||'').trim();
    const parts=raw.split(/\s*\|\s*/).map(cleanReadablePart).filter(Boolean);
    let title='',source='',shows='',other=[];
    let context='';
    parts.forEach(function(p){
      if(/^Title:/i.test(p)) title=p.replace(/^Title:\s*/i,'').trim();
      else if(/^Source:/i.test(p)) source=p.replace(/^Source:\s*/i,'').trim();
      else if(/^Context:/i.test(p)) context=p.replace(/^Context:\s*/i,'').trim();
      else if(/^Summary:/i.test(p)) shows=p.replace(/^Summary:\s*/i,'').trim();
      else if(/^What it shows:/i.test(p)) shows=p.replace(/^What it shows:\s*/i,'').trim();
      else if(/^Snippet:/i.test(p)) shows=p.replace(/^Snippet:\s*/i,'').trim();
      else if(!/Protected readable evidence/i.test(p)) other.push(p);
    });
    if(title||source||context||shows){
      let html='<div class="readableEvidenceCard">';
      if(title) html+='<div><strong>Title:</strong> '+esc(title)+'</div>';
      if(source) html+='<div><strong>Source:</strong> '+esc(source)+'</div>';
      if(context) html+='<div><strong>Context:</strong> '+esc(context)+'</div>';
      if(shows) html+='<div class="summaryLine"><strong>Summary:</strong> '+esc(shows)+'</div>';
      html+='</div>';

  function routeIsolationProfile(inputText, parsed){

    const displayedRenderedCount = (p.claims && p.claims.length) ? p.claims.length : 0;
    const displayedDeferredCount = Math.max(0, displayedDetectedCount - displayedRenderedCount);
    if(displayedDeferredCount>0){
      const deferredNames=(p.__deferredClaimSubjects||[]).slice(0,4).filter(Boolean);
      html+='<div class="claimMeta sourcesLine">Coverage note: '+displayedDeferredCount+' additional detected claim(s) were intentionally deferred in this R1/free-tier view'+(deferredNames.length?': '+esc(deferredNames.join('; ')):'.')+'</div>';
    }
    const claimSurvivorTechnicalLines=extractBackendClaimSurvivorDiagnostics(text);
    const verifiedResultBlocks=[];
    p.claims.forEach(function(c,i){
      const d=normalizeClaimDisplay(c);
      const isCompactExtra=isCompactExtraordinaryDisplay(lastAnalyzedInput,d);
      const claimText=cleanUserFacingClaimText(c,d,i);
      claimSurvivorTechnicalLines.push.apply(claimSurvivorTechnicalLines, claimSurvivorDiagnosticsForObject(c,d,i,claimText));
      claimSurvivorTechnicalLines.push.apply(claimSurvivorTechnicalLines, claimSectionGridDiagnosticsForObject(c,d,i,claimText));
      claimSurvivorTechnicalLines.push.apply(claimSurvivorTechnicalLines, claimTitleSurvivorDiagnosticsForObject(c,d,i,claimText));
      /* AIV_F_v1865_SURRF1: if accepted URL claims exist but the standard verified panel is empty, render the URL claim object through the same clean Result layout. */
      let verifiedPanelHtml=renderVerifiedResultPanel(c,d,i,claimText);
      if(!verifiedPanelHtml) verifiedPanelHtml=renderVerifiedUrlClaimFallbackPanel(c,d,i,claimText);
      if(verifiedPanelHtml){
        verifiedResultBlocks.push({
          c:c,
          d:d,
          i:i,
          isCompactExtra:isCompactExtra,
          html:verifiedPanelHtml
        });
      }
    });
    const verifiedResultTotal=verifiedResultBlocks.length;
    verifiedResultBlocks.forEach(function(block,visibleIndex){
      html+='<div class="claimBlock'+(block.d.isFaith?' isFaith':'')+(block.isCompactExtra?' isCompactExtra':'')+'" data-claim-instance="'+esc(block.c.__aivClaimInstanceId||stableClaimInstanceId(block.c,lastAnalyzedInput,block.i))+'" data-claim-route="'+esc(block.c.__aivClaimRoute||block.c.__aivRouteSeparationClass||'general')+'" data-route-trace="'+esc(block.c.__aivRouteSeparationTrace||'')+'">';

    });
    if(verifiedResultTotal>1){
      html+='<div class="multiResultFutureNote">*Target selection from detected items will be added in an upcoming release.</div>';
    }
    html+=advancedEnd;
    html+=renderClaimSurvivorTechnicalDiagnostics(claimSurvivorTechnicalLines);
    html+=renderRetrievalStateBlock(text,lastAnalyzedInput);
    return html;
  }

  function sanitizeInputForAnalyze(value){
    return String(value||"")
      .split(/\r?\n/)
      .map(function(line){return String(line||"").replace(/^\s*(?:FRONTEND\s+TEST\s+REQUIRED|BACKEND\s+TEST\s+REQUIRED|TEST\s+INPUT)\s*[:\-—]?\s*/i,"").trim();})
      .filter(Boolean)
      .join("\n")
      .trim();
  }

  function urlSeparationCandidatesV1734(value){
    const lines=String(value||"").split(/\r?\n/).map(function(x){return String(x||"").trim();}).filter(Boolean);
    if(lines.length<2) return [];
    const urls=[];
    for(let i=0;i<lines.length;i++){
      if(!/^https?:\/\/\S+$/i.test(lines[i])) return [];
      urls.push(lines[i]);
    }
    return urls.slice(0,3);
  }
  async function fetchCompactTextV1734(value,runId){
    refreshTopRightBackendVersion();
    const url=API_URL+encodeURIComponent(value)+"&_="+Date.now()+"&renderRun="+runId;
    const fetchOptions={cache:"no-store",mode:"cors"};
    if(activeAbortController) fetchOptions.signal=activeAbortController.signal;
    const res=await fetch(url,fetchOptions);
    if(runId!==activeRenderRun)return null;
    if(!res.ok)throw new Error("HTTP "+res.status);
    const txt=await res.text();
    // Backend version is health-endpoint owned; response route labels cannot overwrite it.
    return txt;
  }
  function renderSeparatedUrlResultsV1734(rows){
    let html='';
    rows.forEach(function(row){
      const original=lastAnalyzedInput;
      try{lastAnalyzedInput=row.url; html+=renderStructuredResult(row.text);}
      finally{lastAnalyzedInput=original;}
    });
    return html || '';
  }

  async function newAnalyze(){
    const i=input();
    const raw=sanitizeInputForAnalyze(i?i.value.trim():"");
    if(!raw){if(i)i.focus(); return;}
    if(isRetryTimeoutTestInput(raw)){startRetryTimeoutTest(raw);return;}
    cancelActiveRender();
    const runId=activeRenderRun;
    lastAnalyzedInput=raw;
    beginTranscriptDetection(raw);
    updateSubjectCountPreview();
    scanning();
    activeAbortController=(typeof AbortController!=="undefined")?new AbortController():null;
    clearGeneralScanTimers();
    generalStatusTimer=setTimeout(function(){
      if(runId!==activeRenderRun)return;
      setText("lastAction","Still analyzing...");
      replaceResultHtml(loadingWaveHtml("Still analyzing"));
    },10000);
    generalStopTimer=setTimeout(function(){
      if(runId!==activeRenderRun)return;
      if(activeAbortController){try{activeAbortController.abort();}catch(_e){}}
      activeAbortController=null;
      renderGeneralScanTimeoutPanel();
    },18000);
    try{
      const separatedUrls=urlSeparationCandidatesV1734(raw);
      if(separatedUrls.length>1){
        const rows=[];
        for(let u=0;u<separatedUrls.length;u++){
          const text=await fetchCompactTextV1734(separatedUrls[u],runId);
          if(runId!==activeRenderRun)return;
          if(text==null) return;
          rows.push({url:separatedUrls[u],text:text});
        }
        if(runId!==activeRenderRun)return;
        clearGeneralScanTimers();
        hardClearRenderedResults();
        setText("contentType","");
        setTranscriptStatus(null,"");
        replaceResultHtml(renderSeparatedUrlResultsV1734(rows));
        setText("subjectCountInline","Content subjects detected: "+rows.length);
        if(runId===activeRenderRun)setText("lastAction","Done");
        return;
      }
      const text=await fetchCompactTextV1734(raw,runId);
      if(runId!==activeRenderRun)return;
      clearGeneralScanTimers();
      hardClearRenderedResults();
      setText("contentType","");
      const hasVideoAuthContract=parseActiveVideoAuthContracts(text).length>0;
      if(hasVideoAuthContract){
        setTranscriptStatus(null,"");
      }else{
        const transcriptInfo=inferTranscriptStatusFromBackend(text,lastAnalyzedInput);
        if(transcriptInfo)setTranscriptStatus(transcriptInfo.state,transcriptInfo.detail);
      }
      replaceResultHtml(renderStructuredResult(text));
      try{
        let parsedForCount=parseBackendText(text);
        parsedForCount=isolateParsedForActiveInput(parsedForCount,lastAnalyzedInput);
        parsedForCount=mergeExpectedClaimsForActiveInput(parsedForCount,lastAnalyzedInput);
        if(!parsedForCount.__aivClaimOrderLocked) sortClaimsByOriginalInputOrder(parsedForCount.claims,lastAnalyzedInput);
        protectClaimInstances(parsedForCount.claims,lastAnalyzedInput);
        parsedForCount=protectSerializationBoundaries(parsedForCount,lastAnalyzedInput);
        parsedForCount=applyRouteSeparationTracing(parsedForCount,lastAnalyzedInput);
        parsedForCount=validateRerenderIntegrity(parsedForCount,lastAnalyzedInput);
        parsedForCount=validateRerenderIntegrity(parsedForCount,lastAnalyzedInput);
        if(runId===activeRenderRun && parsedForCount && parsedForCount.claims && parsedForCount.claims.length){
          setText("subjectCountInline","Content subjects detected: "+(parsedForCount.__detectedClaimCount || parsedForCount.claims.length));
        }
      }catch(_e){}
      if(runId===activeRenderRun)setText("lastAction","Done");
    }catch(e){
      if(e && e.name==="AbortError")return;
      clearGeneralScanTimers();
      errorState(e,runId);
    }finally{
      if(runId===activeRenderRun){clearGeneralScanTimers(); activeAbortController=null;}
    }
  }
  function clearInput(){clearRetryTimeoutCache(); cancelActiveRender(); activeLoadedTemplateSample=false; const i=input(); if(i){i.value="";i.dataset.aivLoadedTemplate='false'; i.focus();} updateCounts(); setTranscriptStatus(null,""); setText("lastAction","Input cleared");}
